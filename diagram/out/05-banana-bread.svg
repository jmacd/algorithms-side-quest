<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" preserveAspectRatio="xMidYMid meet">
<rect x="0" y="0" width="1600" height="1200" fill="#ffffff"/>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0,0 L10,5 L0,10 Z" fill="context-stroke"/>
  </marker>
  <marker id="arrow-gold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0,0 L10,5 L0,10 Z" fill="#fdb913"/>
  </marker>
</defs>
<rect x="120" y="100" width="1360" height="1000" fill="#ffffff" stroke="#000000" stroke-width="4" rx="0"/>
<rect x="120" y="100" width="1360" height="110" fill="#fdb913" stroke="#000000" stroke-width="4" rx="0"/>
<text x="800.0" y="176" font-family="Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="72" fill="#000000" text-anchor="middle" font-weight="bold" font-style="normal">Banana Bread</text>
<text x="180" y="270" font-family="Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="28" fill="#000000" text-anchor="start" font-weight="normal" font-style="italic">yield</text>
<text x="290" y="270" font-family="'Roboto Mono', 'Menlo', 'Consolas', monospace" font-size="32" fill="#000000" text-anchor="start" font-weight="normal" font-style="normal">1 loaf</text>
<text x="540" y="270" font-family="Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="28" fill="#000000" text-anchor="start" font-weight="normal" font-style="italic">time</text>
<text x="650" y="270" font-family="'Roboto Mono', 'Menlo', 'Consolas', monospace" font-size="32" fill="#000000" text-anchor="start" font-weight="normal" font-style="normal">60 min</text>
<text x="900" y="270" font-family="Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="28" fill="#000000" text-anchor="start" font-weight="normal" font-style="italic">oven</text>
<text x="1010" y="270" font-family="'Roboto Mono', 'Menlo', 'Consolas', monospace" font-size="32" fill="#000000" text-anchor="start" font-weight="normal" font-style="normal">350 °F</text>
<line x1="160" y1="310" x2="1440" y2="310" stroke="#000000" stroke-width="1.5"/>
<text x="180" y="370" font-family="Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="34" fill="#000000" text-anchor="start" font-weight="bold" font-style="italic">ingredients</text>
<text x="180" y="422" font-family="'Roboto Mono', 'Menlo', 'Consolas', monospace" font-size="28" fill="#000000" text-anchor="start" font-weight="normal" font-style="normal">3 ripe bananas</text>
<text x="180" y="466" font-family="'Roboto Mono', 'Menlo', 'Consolas', monospace" font-size="28" fill="#000000" text-anchor="start" font-weight="normal" font-style="normal">1/3 cup melted butter</text>
<text x="180" y="510" font-family="'Roboto Mono', 'Menlo', 'Consolas', monospace" font-size="28" fill="#000000" text-anchor="start" font-weight="normal" font-style="normal">3/4 cup sugar</text>
<text x="180" y="554" font-family="'Roboto Mono', 'Menlo', 'Consolas', monospace" font-size="28" fill="#000000" text-anchor="start" font-weight="normal" font-style="normal">1 egg, beaten</text>
<text x="180" y="598" font-family="'Roboto Mono', 'Menlo', 'Consolas', monospace" font-size="28" fill="#000000" text-anchor="start" font-weight="normal" font-style="normal">1 tsp vanilla</text>
<text x="180" y="642" font-family="'Roboto Mono', 'Menlo', 'Consolas', monospace" font-size="28" fill="#000000" text-anchor="start" font-weight="normal" font-style="normal">1 tsp baking soda</text>
<text x="180" y="686" font-family="'Roboto Mono', 'Menlo', 'Consolas', monospace" font-size="28" fill="#000000" text-anchor="start" font-weight="normal" font-style="normal">pinch of salt</text>
<text x="180" y="730" font-family="'Roboto Mono', 'Menlo', 'Consolas', monospace" font-size="28" fill="#000000" text-anchor="start" font-weight="normal" font-style="normal">1 1/2 cups flour</text>
<text x="840.0" y="370" font-family="Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="34" fill="#000000" text-anchor="start" font-weight="bold" font-style="italic">steps</text>
<text x="840.0" y="422" font-family="'Roboto Mono', 'Menlo', 'Consolas', monospace" font-size="28" fill="#000000" text-anchor="start" font-weight="normal" font-style="normal">1.  Mash bananas in a bowl.</text>
<text x="840.0" y="466" font-family="'Roboto Mono', 'Menlo', 'Consolas', monospace" font-size="28" fill="#000000" text-anchor="start" font-weight="normal" font-style="normal">2.  Stir in butter.</text>
<text x="840.0" y="510" font-family="'Roboto Mono', 'Menlo', 'Consolas', monospace" font-size="28" fill="#000000" text-anchor="start" font-weight="normal" font-style="normal">3.  Mix in sugar, egg, vanilla.</text>
<text x="840.0" y="554" font-family="'Roboto Mono', 'Menlo', 'Consolas', monospace" font-size="28" fill="#000000" text-anchor="start" font-weight="normal" font-style="normal">4.  Sprinkle baking soda, salt.</text>
<text x="840.0" y="598" font-family="'Roboto Mono', 'Menlo', 'Consolas', monospace" font-size="28" fill="#000000" text-anchor="start" font-weight="normal" font-style="normal">5.  Fold in flour.</text>
<text x="840.0" y="642" font-family="'Roboto Mono', 'Menlo', 'Consolas', monospace" font-size="28" fill="#000000" text-anchor="start" font-weight="normal" font-style="normal">6.  Pour into a buttered loaf pan.</text>
<text x="840.0" y="686" font-family="'Roboto Mono', 'Menlo', 'Consolas', monospace" font-size="28" fill="#000000" text-anchor="start" font-weight="normal" font-style="normal">7.  Bake until a tester comes out clean.</text>
</svg>
